name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  webext:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/webext
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/webext/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run lint:firefox

  vscode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run compile

  obsidian:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/obsidian
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/obsidian/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/cli/go.mod
      - run: go test ./...
